<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoramento Territorial - CGID/FUNAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f7f4;
      --card: #ffffff;
      --text: #1a2e1a;
      --muted: #556b55;
      --primary: #2d5a27; /* Verde Institucional */
      --accent: #8b4513; /* Tom de Terra */
      --danger: #b22222;
      --border: #d1d9d1;
      --accent-top: linear-gradient(90deg, #2d5a27, #8b4513);
    }
    body.dark-theme {
      --bg: #121a12;
      --card: #1c261c;
      --text: #e8f0e8;
      --muted: #a0b0a0;
      --primary: #4ea946;
      --border: #2d3a2d;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    .title h1 { margin: 0; font-size: 24px; color: var(--primary); text-transform: uppercase; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
    .controls label { font-size: 12px; font-weight: bold; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--accent-top); border-radius: 12px 12px 0 0; }
    .metric { font-size: 32px; font-weight: 800; color: var(--primary); margin-top: 10px; }
    .panel { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
    .chart-container { height: 300px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
    th { background: var(--primary); color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid var(--border); }
    tr:hover { background: #f0f4f0; cursor: pointer; }
    .btn { padding: 8px 15px; border-radius: 5px; cursor: pointer; border: 1px solid var(--primary); background: white; font-weight: bold; }
    .btn-dark { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">
        <h1>Painel de Gestão Territorial - CGID</h1>
        <p style="color: var(--muted); margin: 5px 0;">Monitoramento de Prazos e Peças Técnicas</p>
      </div>
      <button id="themeToggleBtn" class="btn">🌙 Modo Escuro</button>
    </div>

    <div class="controls">
      <div style="flex: 1; min-width: 200px;">
        <label>IMPORTAR DADOS (EXCEL/CSV)</label><br>
        <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" style="font-size: 12px; margin-top: 5px;" />
      </div>
      <div>
        <label>FILTRAR ETAPA</label><br>
        <select id="etapaFilter"><option value="">Todas as Etapas</option></select>
      </div>
      <div>
        <label>STATUS PEÇA</label><br>
        <select id="statusFilter"><option value="">Todos os Status</option></select>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Total de Processos</h3>
        <div id="totalProcessos" class="metric">0</div>
      </div>
      <div class="card">
        <h3>Tempo Médio em Trâmite (Dias)</h3>
        <div id="tempoMedio" class="metric">0</div>
      </div>
      <div class="card" style="border-left: 5px solid var(--danger);">
        <h3 style="color: var(--danger);">Pendências Críticas</h3>
        <div id="pendenciaCritica" class="metric" style="color: var(--danger);">0</div>
      </div>
    </div>

    <div class="panel">
      <h2>Distribuição por Fase de Demarcação</h2>
      <div class="chart-container">
        <canvas id="funnelChart"></canvas>
      </div>
      
      <div style="overflow-x: auto;">
        <table id="processTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Terra Indígena</th>
              <th>Povo</th>
              <th>Etapa</th>
              <th>Dias Parado</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    const fileInput = document.getElementById("fileInput");
    
    // Função para calcular dias de espera (Arredondado)
    function calcularDias(dataRaw) {
      if (!dataRaw) return 0;
      let dataInicio;
      if (typeof dataRaw === 'number') {
        dataInicio = new Date((dataRaw - 25569) * 86400 * 1000);
      } else {
        const partes = dataRaw.split('/');
        dataInicio = partes.length === 3 ? new Date(partes[2], partes[1]-1, partes[0]) : new Date(dataRaw);
      }
      if (isNaN(dataInicio)) return 0;
      const hoje = new Date();
      return Math.round((hoje - dataInicio) / (1000 * 60 * 60 * 24));
    }

    function renderDashboard(data) {
      const total = data.length;
      let somaDias = 0;
      let pendencias = 0;
      const tableBody = document.getElementById("tableBody");
      tableBody.innerHTML = "";

      const etapasCount = {};

      data.forEach(r => {
        const dias = calcularDias(r[4]);
        somaDias += dias;
        if (String(r[5]).toLowerCase().includes("pendente")) pendencias++;
        
        etapasCount[r[3]] = (etapasCount[r[3]] || 0) + 1;

        tableBody.innerHTML += `<tr>
          <td>${r[0]}</td>
          <td>${r[1]}</td>
          <td>${r[2]}</td>
          <td>${r[3]}</td>
          <td>${dias}</td>
        </tr>`;
      });

      document.getElementById("totalProcessos").textContent = total;
      document.getElementById("tempoMedio").textContent = total > 0 ? Math.round(somaDias / total) : 0;
      document.getElementById("pendenciaCritica").textContent = pendencias;

      renderChart(etapasCount);
    }

    let myChart;
    function renderChart(etapasData) {
      const ctx = document.getElementById('funnelChart').getContext('2d');
      if (myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Object.keys(etapasData),
          datasets: [{
            label: 'Qtd de Processos',
            data: Object.values(etapasData),
            backgroundColor: '#2d5a27'
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (evt) => {
        const bstr = evt.target.result;
        const wb = XLSX.read(bstr, { type: 'binary' });
        const wsname = wb.SheetNames[0];
        const ws = wb.Sheets[wsname];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1 }).slice(1);
        allRows = data.filter(r => r.length > 0);
        renderDashboard(allRows);
      };
      reader.readAsBinaryString(file);
    });

    document.getElementById("themeToggleBtn").addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
    });
  </script>
</body>
</html>
